<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>多源轨道综合可视化系统</title>
    <script src="https://cdn.jsdelivr.net/npm/cesium/Build/Cesium/Cesium.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/cesium/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        #cesiumContainer { width: 100%; height: 100vh; }
        #panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 14px 18px;
            border-radius: 8px;
            font-family: sans-serif;
            line-height: 1.8;
        }
        #panel h3 { margin-bottom: 8px; font-size: 15px; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <div id="panel">
        <h3>多源轨道可视化</h3>
        <div class="legend-item"><span class="dot" style="background:cyan"></span>状态向量（仿真）</div>
        <div class="legend-item"><span class="dot" style="background:yellow"></span>TLE（低轨预报）</div>
        <div class="legend-item"><span class="dot" style="background:lime"></span>广播星历（导航）</div>
        <div class="legend-item"><span class="dot" style="background:red"></span>精密星历（科学）</div>
    </div>
    <script>
        // TODO: 替换为你的 Cesium Ion Token（从 https://cesium.com/ion 注册免费账号获取）
        Cesium.Ion.defaultAccessToken = "YOUR_CESIUM_ION_TOKEN_HERE";

        const viewer = new Cesium.Viewer("cesiumContainer", {
            timeline: true,
            animation: true,
            shouldAnimate: true,
        });

        fetch("/api/all")
            .then((res) => res.json())
            .then((data) => {
                viewer.dataSources.add(Cesium.CzmlDataSource.load(data));
            });
    </script>
</body>
</html>
